<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3galty | Login</title>

  {% load static %}
    
  <link rel="stylesheet" href="{% static '_3galty/css/bootstrap.min.css'%}">
  <link rel="stylesheet" href="{% static '_3galty/css/login.css'%}">
  <link rel="stylesheet" href="{% static '_3galty/font/all.css'%}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="icon" href="{% static '_3galty/img/Web Logo.png'%}" type="image/x-icon">
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</head>

<body>
  <nav>
    <div>
      <a href="{% url 'home' %}"><img class="NavLogo" src="{% static '_3galty/img/Web Logo.png'%}" alt="Bicycle Logo" sizes="" srcset=""></a>
    </div>
  </nav>



  <div class="imageBaground">
    <img class="image" src="{% static '_3galty/img/free-photo-of-bicycles.jpeg.jpg'%}" width="450px" height="600px" alt="">
  </div>
  
  <div class="formContainer">
    <h1>Login</h1>
    <div class="container">
      <form method="POST">
        {% csrf_token %}
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Your Email.." required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Your Password.." pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" required><br><br>

        <input type="submit" value="Log in">

        <p>Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
      </form>
    </div>
  </div>

</body>
</html>
